name: "agentspec self-tests"
description: "Tests for AgentSpec's own assertion engine using echo mock agent"

tests:
  - name: "contains assertion passes"
    input: "contains test string here"
    expect:
      contains: "contains"

  - name: "contains assertion fails on missing string"
    input: "hello world greeting"
    expect:
      contains: "goodbye"

  - name: "contains_any matches when one option present"
    input: "I love cats and dogs"
    expect:
      contains_any: ["dogs", "cats", "birds"]

  - name: "contains_any fails when none present"
    input: "I love pizza and pasta"
    expect:
      contains_any: ["dogs", "cats", "birds"]

  - name: "contains_all requires all strings present"
    input: "the quick brown fox jumps over"
    expect:
      contains_all: ["quick", "brown", "fox"]

  - name: "contains_all fails if any missing"
    input: "the quick fox jumps over"
    expect:
      contains_all: ["quick", "brown", "fox"]

  - name: "regex matches pattern in output"
    input: "Error code: ERR-12345 occurred here"
    expect:
      regex: "ERR-\\d{5}"

  - name: "regex fails on non-matching output"
    input: "No errors here at all"
    expect:
      regex: "ERR-\\d{5}"

  - name: "not_contains passes when string absent"
    input: "Success: operation completed fine"
    expect:
      not_contains: "error"

  - name: "not_contains fails when string present"
    input: "An error occurred in the system"
    expect:
      not_contains: "error"

  - name: "semantically_similar passes with word overlap"
    input: "I need to refresh my authentication token now"
    expect:
      semantically_similar: "refresh the auth token"
      min_confidence: 0.4

  - name: "latency check passes under threshold"
    input: "fast response test here"
    expect:
      contains: "fast"
      max_latency_ms: 5000